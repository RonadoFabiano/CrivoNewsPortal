# ── Groq API ──────────────────────────────────────────────────────────────
ai:
  groq:
    apiKey: "${AI_GROQ_APIKEY:}"
    apiKey2: "${AI_GROQ_APIKEY2:}"
    model: "${AI_GROQ_MODEL:llama-3.3-70b-versatile}"
    timeoutSeconds: 90



