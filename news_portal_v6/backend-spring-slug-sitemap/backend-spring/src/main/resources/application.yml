server:
  port: 8081
  address: 0.0.0.0

app:
  site:
    baseUrl: "${APP_BASE_URL:http://localhost:5173}"
  rss:
    defaultFeed: "https://news.google.com/rss?hl=pt-BR&gl=BR&ceid=BR:pt-419"
  cors:
    allowed-origins: "${APP_CORS_ORIGINS:*}"
  ai:
    worker:
      enabled: true
      delayMs: 40000
      maxChars: 5000
      maxRetries: 3

spring:
  profiles:
    active: local
  mvc:
    problemdetails:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driverClassName: org.postgresql.Driver
    hikari:
      maximum-pool-size: 12
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          lob:
            non_contextual_creation: true
          batch_size: 20
        order_inserts: true
        order_updates: true

